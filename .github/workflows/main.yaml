name: Selenium Pytest CI

on: [push]

jobs:
  automation-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Updated to v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pytest (Headless)
        run: |
          # Headless mode is mandatory for GitHub Actions
          python -m pytest --browser chrome --html=reports/report.html --self-contained-html
        continue-on-error: true

      - name: Upload Report
        uses: actions/upload-artifact@v4 # FIXED: Updated from v3 to v4
        with:
          name: test-reports
          path: reports/

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4 # FIXED: Updated from v3 to v4
        with:
          name: test-screenshots
          path: reports/screenshots/